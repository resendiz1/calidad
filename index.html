<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    
    <br><br>
<!-- encabezado -->
<div class="container shadow">
  <div class="row border border-5">
    
    <div class="col-4 centrar-verticalmente p-2">
      <img src="img/logo.png" class="mx-auto img-fluid" alt="">
    </div>
    
    <div class="col-4 border"> 
      <div class="row text-center border">
        <h3>FORMATO</h3>
      </div>
      
      <div class="row">
            <span class="text-center">RECEPCIÓN DE MATERIA PRIMA Y MATERIAL DE EMPAQUE</span>
      </div>
    </div>

    <div class="col-4 border">
      <div class="row">
        <div class="col-4 border">Codigo</div>
        <div class="col-8 border p-0" >FO/GP/CC/070/01</div>
      </div>
      <div class="row">
        <div class="col-4 border">Versión</div>
        <div class="col-8 border p-0" >03</div>
      </div>
      <div class="row">
        <div class="col-4 border">Vigencia</div>
        <div class="col-8 border p-0" >AGOSTO 2023</div>
      </div>
      <div class="row">
        <div class="col-4 border">Pagina</div>
        <div class="col-8 border p-0" >1 de 4</div>
      </div>

    </div>
  
  </div>
</div>
<!-- encabezado -->
    

<!-- datos del formato -->
<div class="container shadow">

  <div class="row mt-3 p-4 justify-content-center ">

  <div class="col-sm-12 col-md-8 col-lg-5 border">

      <div class="row">
        <div class="col-auto mt-1">
          <span class="centrar-verticalmente h6">Planta:</span>
        </div>       
        <div class=" col-sm-2 col-md-2 col-lg-2 bg-white mt-1">
          <input type="number" min="1" max="3" value="1" class="form-control form-control-sm" required>
        </div>
      </div>
      
      <div class="row mt-2 border-top">
        <div class="col-auto mt-1">
          <span class="centrar-verticalmente h6">Fecha:</span>
        </div>       
        <div class="col-6 bg-white mt-1">
          <span class="font-weight-bold">26 de enero del 2024</span>
        </div>
      
    </div>
  </div>


    <div class="col-sm-12 col-md-12 col-lg-2 my-3 "></div>     <!-- Este es para que se quede el espacio en blando entre las dos tablas de datos -->


  <div class="col-sm-12 col-md-8 col-lg-5 border p-2">
    
    <div class="row border-bottom">
      <div class="col-auto mt-1">
        <span class="centrar-verticalmente h6">Folio:</span>
      </div>       
      <div class="col-auto bg-white mt-1">
        <span class="text-danger font-weight-bold h6">PL3-0001</span>
      </div>
    </div>
    
    <div class="row">
      <div class="col-auto">
        <span class="centrar-verticalmente h6">Hora de recepción:</span>
      </div>       
      <div class="col-6 bg-white">
        <span class="font-weight-bold"> 12:20 am </span>
      </div>
    </dv>      
    </div>
  </div>
</div>

</div>
<!-- datos del formato -->


<!-- Titulos -->
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-6">
      <div class="row justify-content-around">
        <div class="col-10 text-center fondo border border-dark">
          <h4 class="mt-1">DATOS DE MATERIA PRIMA</h4>
        </div>
        <div class="col-10 mt-3 border fondo-titulos border border-gray">
          <h6 class="mt-1">PRODUCTO:</h6>
        </div>
        <div class="col-10 text-left p-0">
          <select class="text-left form-select mt-2">
            <option value="Pulidura de arroz">Pulidura de arroz</option>
            <option value="Salvadillo">Salvadillo</option>
            <option value="Alfalfa">Alfalfa</option>
          </select>
        </div>
      </div>
    </div>

    <div class="col-6">
      <div class="row justify-content-around">
        <div class="col-10 text-center fondo border border-dark">
          <h4 class="mt-1">DATOS DEL TRANSPORTE</h4>
        </div>
        <div class="col-10 mt-3 border fondo-titulos border border-gray">
          <h6 class="mt-1">LINEA TRANSPORTISTA</h6>
        </div>
        <div class="col-10 text-left p-0">
          <select class="text-left form-select mt-2">
            <option value="Tinisa">Tinisa</option>
            <option value="SCP">SCP</option>
            <option value="villaueva">villaueva</option>
            <option value="BMER">BMER</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- Titulos -->

 











    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  </body>
</html>
