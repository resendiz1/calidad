<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla con Búsqueda en Tiempo Real</title>
    <style>
        /* Estilos opcionales para mejorar la apariencia */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<input type="text" id="searchInput" placeholder="Buscar en la tabla">

<table id="myTable">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Ciudad</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>John Doe</td>
            <td>25</td>
            <td>New York</td>
        </tr>
        <tr>
            <td>Jane Doe</td>
            <td>30</td>
            <td>Los Angeles</td>
        </tr>
        <!-- Agrega más filas según sea necesario -->
    </tbody>
</table>

<script>

    // Obtén la tabla y el campo de búsqueda
    var table = document.getElementById('myTable');
    var searchInput = document.getElementById('searchInput');

    // Agrega un evento de escucha al campo de búsqueda
    searchInput.addEventListener('input', function () {
      
        // Obtiene el valor del campo de búsqueda y conviértelo a minúsculas
        var searchTerm = searchInput.value.toLowerCase();

        // Obtén todas las filas de la tabla
        var rows = table.getElementsByTagName('tr');

        // Recorre todas las filas y muestra u oculta según la búsqueda
        for (var i = 1; i < rows.length; i++) { // Comienza desde 1 para omitir la fila de encabezado
            var row = rows[i];
            var cells = row.getElementsByTagName('td');
            var found = false;

            // Recorre todas las celdas en la fila actual
            for (var j = 0; j < cells.length; j++) {
                var cellValue = cells[j].textContent.toLowerCase();

                // Compara el valor de la celda con el término de búsqueda
                if (cellValue.indexOf(searchTerm) > -1) {
                    found = true;
                    break;
                }
            }

            // Muestra u oculta la fila según si se encuentra o no la búsqueda
            if (found) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        }
    });

</script>

</body>
</html>
